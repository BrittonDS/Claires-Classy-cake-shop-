<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brownies</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f6f3f1;
  color:#222;
}

/* Container */
.container{
  width:90%;
  max-width:1200px;
  margin:auto;
  padding:60px 0;
}

/* Title */
h1{
  font-family:'Playfair Display', serif;
  font-size:48px;
  margin-bottom:40px;
  text-align:center;
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(280px,1fr));
  gap:30px;
}

/* Card */
.card{
  background:#fff;
  border-radius:24px;
  padding:18px;
  transition:all 0.3s ease;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 18px 40px rgba(0,0,0,0.08);
}

/* Image */
.card img{
  width:100%;
  border-radius:18px;
  height:220px;
  object-fit:cover;
}

/* Title inside card */
.card h3{
  font-family:'Playfair Display', serif;
  margin:15px 0 5px;
  font-size:20px;
}

/* Price */
.price{
  color:#666;
  font-size:15px;
  margin-bottom:10px;
}

/* Button */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:999px;
  background:#111;
  color:#fff;
  font-size:14px;
  cursor:pointer;
  transition:all 0.25s ease;
}

button:hover{
  background:#333;
}

/* Optional subtle subtitle */
.subtitle{
  text-align:center;
  color:#777;
  margin-bottom:50px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Our Brownies</h1>
  <p class="subtitle">Handcrafted, rich and indulgent — baked fresh to order</p>

  <div class="grid">
    
    <div class="card">
      <img src="brownie1.jpg">
      <h3>Classic Chocolate Brownie</h3>
      <p class="price">£4.50</p>
      <button onclick="orderProduct('Classic Chocolate Brownie')">Order</button>
    </div>

    <div class="card">
      <img src="brownie2.jpg">
      <h3>Caramel Brownie</h3>
      <p class="price">£5.00</p>
      <button onclick="orderProduct('Caramel Brownie')">Order</button>
    </div>

  </div>
</div>

<script>
function orderProduct(productName){
  const subject="Order Enquiry";
  const body=`Hi, I would like to order:\n\n${productName}`;
  window.location.href=`mailto:clairesclassycakeshop@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}
</script>

</body>
</html>
