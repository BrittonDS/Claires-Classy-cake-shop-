<html>
<head>
  <title>Your Basket</title>
</head>

<body>

<h1>Your Basket</h1>

<div id="items"></div>
<h2 id="total"></h2>

<script>
// Get saved basket
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;
let output = "";

// Loop through items
cart.forEach(item => {
  total += item.price;

  output += `<p>${item.name} - £${item.price}</p>`;
});

// Show on page
document.getElementById("items").innerHTML = output;
document.getElementById("total").innerText = "Total: £" + total;

</script>

</body>
</html>
