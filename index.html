<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sweet Delights</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #111;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: #000;
    color: #fff;
}

nav a {
    margin-left: 25px;
    text-decoration: none;
    color: white;
    font-size: 14px;
}

/* HERO */
.hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 80px 40px;
    background: #f8d7e3;
}

.hero-text {
    max-width: 500px;
}

.hero h2 {
    font-size: 40px;
    margin-bottom: 10px;
}

.hero span {
    color: #ff4fa3;
}

.hero p {
    margin-bottom: 20px;
}

.hero button {
    background: #ff4fa3;
    border: none;
    padding: 12px 20px;
    color: white;
    cursor: pointer;
}

.hero img {
    width: 300px;
    border-radius: 10px;
}

/* PRODUCTS */
.products {
    padding: 60px 40px;
}

.products h2 {
    margin-bottom: 30px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 25px;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card h3 {
    margin-top: 10px;
}

/* CUSTOM CAKES */
.custom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 60px 40px;
    background: #000;
    color: white;
}

.custom-text {
    max-width: 400px;
}

.custom button {
    background: #ff4fa3;
    border: none;
    padding: 12px 20px;
    color: white;
    margin-top: 10px;
    cursor: pointer;
}

.custom img {
    width: 300px;
    border-radius: 10px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
}
</style>

</head>

<body>

<header>
    <h1>Sweet Delights</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-text">
        <h2>Delicious Treats Made With <span>Love</span></h2>
        <p>Baked fresh for every order</p>
        <button>View Our Treats</button>
    </div>
    <img src="brownie.jpg">
</section>

<section class="products">
    <h2>Our Treats</h2>

    <div class="grid">
        <div class="card">
            <img src="cookiepie.jpg">
            <h3>Cookie Pies</h3>
        </div>

        <div class="card">
            <img src="brownie.jpg">
            <h3>Brownies</h3>
        </div>

        <div class="card">
            <img src="traybake.jpg">
            <h3>Tray Bake Cakes</h3>
        </div>

        <div class="card">
            <img src="cookie.jpg">
            <h3>Cookies</h3>
        </div>
    </div>
</section>

<section class="custom">
    <div class="custom-text">
        <h2>Custom Cakes</h2>
        <p>Prices from £65</p>
        <p>*Price varies depending on size and detail</p>
        <button>Email for a quote</button>
    </div>
    <img src="cake.jpg">
</section>

<footer>
    <p>Email: info@yourbakery.com</p>
</footer>

</body>
</html>
